<!DOCTYPE html>
<html lang="en">
<head>
  <script>
if ('serviceWorker' in navigator) {

navigator.serviceWorker.getRegistrations().then(function(registrations) {

for (let registration of registrations) {
registration.unregister();
}

});

/* also clear service worker caches */
if ('caches' in window) {
caches.keys().then(function(names) {
for (let name of names) caches.delete(name);
});
}

}
</script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ListenMe — YouTube Search</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    :root { --yt-red: #ff0000; }
    body { overflow-x: hidden; }

    /* ══ LAYOUT ══ */
    .app-layout { display: flex; min-height: calc(100vh - 60px); padding-bottom: 24px; }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: 220px; flex-shrink: 0; background: #000;
      padding: 8px 0; position: sticky; top: 60px;
      height: calc(100vh - 60px); overflow-y: auto;
      border-right: 1px solid var(--border);
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .sb-section { padding: 0 8px; margin-bottom: 4px; }
    .sb-btn {
      display: flex; align-items: center; gap: 11px;
      width: 100%; padding: 9px 12px; border-radius: 4px;
      color: var(--text-2); font-size: 13px; font-weight: 600;
      border: none; background: none; text-align: left;
      cursor: pointer; font-family: var(--font-body);
      transition: color 0.15s, background 0.15s;
    }
    .sb-btn:hover  { color: var(--text); background: rgba(255,255,255,0.06); }
    .sb-btn.active { color: var(--text); background: rgba(255,255,255,0.1); }
    .sb-btn .ic { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
    .sb-divider { height: 1px; background: var(--border); margin: 8px 12px; }
    .sb-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--muted);
      padding: 14px 12px 6px; display: block;
    }

    /* ══ MAIN ══ */
    .main { flex: 1; min-width: 0; }

    /* ══ HERO SEARCH ══ */
    .yt-hero {
      padding: 36px 24px 24px;
      background: linear-gradient(180deg, rgba(255,0,0,0.04) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    .yt-hero-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .yt-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 50px;
      background: rgba(255,0,0,0.08); border: 1px solid rgba(255,0,0,0.2);
      color: #ff6b6b; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .yt-hero h1 {
      font-family: var(--font-display); font-size: 26px; font-weight: 900;
      margin-bottom: 4px;
    }
    .yt-hero h1 span { color: var(--primary); }
    .yt-hero p { color: var(--text-2); font-size: 13px; margin-bottom: 20px; }

    .search-bar-wrap { display: flex; gap: 10px; max-width: 680px; }
    .search-bar-wrap input {
      flex: 1; height: 46px; padding: 0 18px;
      border-radius: 50px; font-size: 15px;
      background: var(--card); border: 1px solid var(--border);
    }
    .search-bar-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(29,185,84,0.1); }
    .search-bar-wrap input::placeholder { color: var(--muted); }
    .btn-search {
      height: 46px; padding: 0 24px; border-radius: 50px;
      background: var(--primary); color: #000;
      border: none; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: var(--font-body);
      transition: all 0.18s; white-space: nowrap; display: flex; align-items: center; gap: 8px;
    }
    .btn-search:hover { background: var(--accent); transform: scale(1.02); }
    .btn-search:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Filter chips */
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 16px 24px 0; }
    .fchip {
      padding: 5px 14px; border-radius: 50px;
      background: var(--card); color: var(--text-2);
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); font-family: var(--font-body);
      transition: all 0.15s;
    }
    .fchip:hover { background: var(--card-hover); color: var(--text); border-color: var(--border-hover); }
    .fchip.active { background: rgba(29,185,84,0.1); color: var(--primary); border-color: rgba(29,185,84,0.3); }

    /* ══ RESULTS ══ */
    .results-wrap { padding: 20px 24px 32px; }

    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .results-title { font-family: var(--font-display); font-size: 18px; font-weight: 800; }
    .results-meta  { font-size: 12px; color: var(--muted); font-weight: 600; }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    /* ── Video Card ── */
    .yt-card {
      background: var(--card); border-radius: 10px; overflow: hidden;
      cursor: pointer; transition: all 0.22s;
      animation: fadeInUp 0.3s ease both;
      border: 1px solid transparent;
      position: relative;
    }
    .yt-card:hover {
      background: var(--card-hover);
      border-color: rgba(255,255,255,0.06);
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(0,0,0,0.5);
    }
    .yt-thumb {
      width: 100%; aspect-ratio: 16/9;
      background: #111; position: relative; overflow: hidden;
    }
    .yt-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .yt-card:hover .yt-thumb img { transform: scale(1.04); }
    .yt-duration {
      position: absolute; bottom: 7px; right: 7px;
      background: rgba(0,0,0,0.85); color: #fff;
      font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 3px;
    }
    .yt-play-ov {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .yt-card:hover .yt-play-ov { opacity: 1; }
    .yt-play-circle {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--primary); color: #000;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900;
      box-shadow: 0 4px 20px rgba(29,185,84,0.5);
      transition: transform 0.15s;
    }
    .yt-card:hover .yt-play-circle { transform: scale(1.08); }

    .yt-info { padding: 12px 14px 14px; }
    .yt-title {
      font-size: 13px; font-weight: 700; line-height: 1.4;
      margin-bottom: 6px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .yt-channel { font-size: 11px; color: var(--text-2); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .yt-stats { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
    .yt-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }

    /* ── Skeleton ── */
    .skeleton { background: var(--card); border-radius: 10px; overflow: hidden; animation: shimmer 1.4s infinite; }
    .sk-thumb  { width: 100%; aspect-ratio: 16/9; background: var(--card-hover); }
    .sk-body   { padding: 12px 14px 14px; }
    .sk-line   { height: 11px; border-radius: 4px; background: var(--card-hover); margin-bottom: 8px; }
    @keyframes shimmer {
      0%,100% { opacity: 1; } 50% { opacity: 0.5; }
    }

    /* ── Empty / Error ── */
    .yt-empty {
      grid-column: 1/-1; text-align: center;
      padding: 60px 20px; color: var(--muted);
    }
    .yt-empty .ei { font-size: 52px; margin-bottom: 14px; opacity: 0.5; }
    .yt-empty h3  { font-family: var(--font-display); font-size: 18px; color: var(--text-2); margin-bottom: 6px; }
    .yt-empty p   { font-size: 13px; }

    /* ── Trending chips ── */
    .trending-section { padding: 24px 24px 0; }
    .trending-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 12px; }
    .trending-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .trend-pill {
      padding: 7px 16px; border-radius: 50px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text-2); font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: var(--font-body);
      transition: all 0.18s; display: flex; align-items: center; gap: 7px;
    }
    .trend-pill:hover { background: var(--card-hover); color: var(--text); border-color: var(--primary); }
    .trend-ic { font-size: 14px; }

    /* ══ YOUTUBE PLAYER MODAL — full screen slide up ══ */
    .yt-modal-overlay {
      position: fixed; inset: 0; z-index: 600;
      pointer-events: none;
    }
    .yt-modal-overlay.open { pointer-events: all; }

    /* Dark backdrop fades in */
    .yt-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0); 
      transition: background 0.38s ease;
    }
    .yt-modal-overlay.open .yt-backdrop { background: rgba(0,0,0,0.88); }

    /* Full screen sheet slides up from bottom */
    .yt-modal {
      position: absolute; left: 0; right: 0; bottom: 0;
      height: 100%; max-height: 100%;
      background: #0a0a0a; border-radius: 0;
      overflow: hidden; display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.42s cubic-bezier(0.32,0.72,0,1);
    }
    .yt-modal-overlay.open .yt-modal { transform: translateY(0); }

    /* Top drag handle */
    .yt-drag-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.2);
      margin: 12px auto 0; flex-shrink: 0; cursor: pointer;
    }

    /* Header */
    .yt-modal-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; padding: 12px 18px 12px;
      flex-shrink: 0;
    }
    .yt-modal-title-wrap { min-width: 0; flex: 1; }
    .yt-modal-title {
      font-family: var(--font-display); font-size: 15px; font-weight: 800;
      line-height: 1.35; margin-bottom: 3px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .yt-modal-channel { font-size: 12px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .yt-modal-close {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: none; color: var(--text-2);
      cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; margin-top: 2px;
    }
    .yt-modal-close:hover { background: rgba(255,255,255,0.16); color: var(--text); }

    /* Video fills remaining space */
    .yt-embed-wrap {
      flex: 1; position: relative; background: #000; min-height: 0;
    }
    .yt-embed-wrap iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    /* Footer */
    .yt-modal-footer {
      padding: 14px 18px 28px; display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-shrink: 0; background: #0a0a0a;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .yt-modal-note { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .yt-open-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 18px; border-radius: 50px;
      background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.2);
      color: #ff6b6b; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: var(--font-body);
      transition: all 0.15s; text-decoration: none;
    }
    .yt-open-btn:hover { background: rgba(255,0,0,0.18); color: #ff4444; }

    /* ══ LOAD MORE ══ */
    .load-more-wrap { text-align: center; padding: 20px 0 0; }
    .btn-load-more {
      padding: 10px 32px; border-radius: 50px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text-2); font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: var(--font-body);
      transition: all 0.18s;
    }
    .btn-load-more:hover { background: var(--card-hover); color: var(--text); border-color: var(--primary); }
    .btn-load-more:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 900px) { .sidebar { display: none; } }
    @media (max-width: 640px) {
      .yt-hero { padding: 24px 14px 16px; }
      .yt-hero h1 { font-size: 20px; }
      .search-bar-wrap { flex-wrap: wrap; }
      .search-bar-wrap input { height: 42px; }
      .btn-search { height: 42px; width: 100%; justify-content: center; }
      .results-wrap { padding: 14px 14px 24px; }
      .results-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .yt-modal { border-radius: 10px; }
      .filter-row, .trending-section { padding-left: 14px; padding-right: 14px; }
    }
    @media (max-width: 400px) {
      .results-grid { grid-template-columns: 1fr; }
    }
  </style>

</head>

<script>
// ── Config ──────────────────────────────────────────────────────
const YT_API_KEY = 'AIzaSyBQ-KWMNdjLSwggzNpP4V4OvY0lTeWYOQ4';
const YT_API     = 'https://www.googleapis.com/youtube/v3';
const MAX_RESULTS = 20;

// ── State ───────────────────────────────────────────────────────
let currentQuery     = '';
let currentFilter    = '';
let nextPageToken    = '';
let isLoading        = false;
let allResults       = [];

// ── Trending presets ────────────────────────────────────────────
const TRENDING = [
  { ic:'🎤', label:'Arijit Singh' },
  { ic:'🎵', label:'Bollywood 2025' },
  { ic:'🔥', label:'AP Dhillon' },
  { ic:'🎶', label:'Punjabi Hits' },
  { ic:'🌙', label:'Lo-fi Study' },
  { ic:'💃', label:'Trending Reels Songs' },
  { ic:'🎸', label:'Rock Classics' },
  { ic:'🪘', label:'Rahman Hits' },
  { ic:'🌊', label:'Chill Vibes' },
  { ic:'💪', label:'Gym Motivation' },
  { ic:'🎹', label:'Piano Instrumental' },
  { ic:'✨', label:'New Hindi Songs' },
];

// ── Init ────────────────────────────────────────────────────────
(function init() {
  try { requireAuth(); } catch(e) {}
  try {
    const u = getUser();
    if (u?.is_admin) {
      document.getElementById('adminBadge').style.display = 'inline-flex';
      const nl = document.getElementById('navLinks');
      const ul = document.createElement('a'); ul.href = 'upload.html'; ul.textContent = 'Upload';
      nl.insertBefore(ul, nl.children[2]);
    }
  } catch(e) {}
  buildTrending();
  // Enter key
  document.getElementById('ytSearchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
})();

function buildTrending() {
  const g = document.getElementById('trendingGrid');
  g.innerHTML = TRENDING.map(t => `
    <div class="trend-pill" onclick="quickSearch('${escJs(t.label)}')">
      <span class="trend-ic">${t.ic}</span>${esc(t.label)}
    </div>
  `).join('');
}

// ── Search ──────────────────────────────────────────────────────
async function doSearch(query) {
  const input = document.getElementById('ytSearchInput');
  const q = (query || input.value || '').trim();
  if (!q) { input.focus(); return; }
  if (query) input.value = query;

  currentQuery   = q;
  nextPageToken  = '';
  allResults     = [];
  isLoading      = true;

  // Show filter row, hide trending
  document.getElementById('filterRow').style.display = 'flex';
  document.getElementById('trendingSection').style.display = 'none';
  document.getElementById('resultsWrap').style.display = 'block';
  document.getElementById('resultsTitle').textContent = `"${q}"`;
  document.getElementById('resultsMeta').textContent = '';
  document.getElementById('loadMoreWrap').style.display = 'none';

  // Skeleton
  showSkeletons(8);
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('searchBtn').innerHTML = '<span>⏳</span> Searching…';

  await fetchResults(q, '', true);
}

function quickSearch(q) {
  document.getElementById('ytSearchInput').value = q;
  doSearch(q);
}

async function fetchResults(q, pageToken, replace) {
  try {
    // Build query — always append "song" or "music" for better audio results
    const searchQ = currentFilter === 'live' ? `${q} live performance`
                  : currentFilter === 'short' ? `${q} short`
                  : `${q}`;

    const params = new URLSearchParams({
      part:       'snippet',
      q:          searchQ,
      type:       'video',
      videoCategoryId: '10', // Music category
      maxResults: MAX_RESULTS,
      key:        YT_API_KEY,
      ...(pageToken ? { pageToken } : {}),
    });

    const res  = await fetch(`${YT_API}/search?${params}`);
    const data = await res.json();

    if (data.error) {
      showError(data.error.message || 'API error'); return;
    }

    const videoIds = data.items.map(i => i.id.videoId).join(',');
    nextPageToken  = data.nextPageToken || '';

    // Fetch video details (duration, view count)
    const detailRes  = await fetch(`${YT_API}/videos?part=contentDetails,statistics&id=${videoIds}&key=${YT_API_KEY}`);
    const detailData = await detailRes.json();
    const detailMap  = {};
    (detailData.items || []).forEach(v => { detailMap[v.id] = v; });

    const cards = data.items.map(item => {
      const vid    = item.id.videoId;
      const snip   = item.snippet;
      const detail = detailMap[vid];
      const dur    = detail ? parseDuration(detail.contentDetails.duration) : '';
      const views  = detail ? fmtViews(detail.statistics.viewCount) : '';
      return { vid, title: snip.title, channel: snip.channelTitle, thumb: snip.thumbnails.medium?.url || snip.thumbnails.default?.url, dur, views, published: snip.publishedAt };
    });

    if (replace) allResults = cards;
    else allResults = [...allResults, ...cards];

    renderCards(allResults);
    document.getElementById('resultsMeta').textContent = allResults.length + ' results';
    document.getElementById('loadMoreWrap').style.display = nextPageToken ? 'block' : 'none';

  } catch(e) {
    showError('Failed to reach YouTube. Check your connection.');
  } finally {
    isLoading = false;
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('searchBtn').innerHTML = '<span>🔍</span> Search';
  }
}

async function loadMore() {
  if (!nextPageToken || isLoading) return;
  isLoading = true;
  document.getElementById('loadMoreBtn').disabled = true;
  document.getElementById('loadMoreBtn').textContent = 'Loading…';
  await fetchResults(currentQuery, nextPageToken, false);
  document.getElementById('loadMoreBtn').disabled = false;
  document.getElementById('loadMoreBtn').textContent = 'Load more results';
}

// ── Filter ──────────────────────────────────────────────────────
function setFilter(el, val) {
  currentFilter = val;
  document.querySelectorAll('.fchip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (currentQuery) doSearch(currentQuery);
}

// ── Render ──────────────────────────────────────────────────────
function renderCards(cards) {
  const g = document.getElementById('resultsGrid');
  if (!cards.length) {
    g.innerHTML = `
      <div class="yt-empty">
        <div class="ei">🎵</div>
        <h3>No results found</h3>
        <p>Try different keywords or check your spelling</p>
      </div>`;
    return;
  }
  g.innerHTML = cards.map((c, i) => `
    <div class="yt-card" style="animation-delay:${(i % MAX_RESULTS) * 0.03}s" onclick="openPlayer('${escJs(c.vid)}','${escJs(c.title)}','${escJs(c.channel)}')">
      <div class="yt-thumb">
        <img src="${esc(c.thumb)}" loading="lazy" alt="${esc(c.title)}"/>
        ${c.dur ? `<div class="yt-duration">${esc(c.dur)}</div>` : ''}
        <div class="yt-play-ov"><div class="yt-play-circle">▶</div></div>
      </div>
      <div class="yt-info">
        <div class="yt-title">${esc(c.title)}</div>
        <div class="yt-channel">${esc(c.channel)}</div>
        <div class="yt-stats">
          ${c.views ? `<span>${esc(c.views)} views</span>` : ''}
          ${c.views && c.published ? `<div class="yt-dot"></div>` : ''}
          ${c.published ? `<span>${timeAgo(c.published)}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function showSkeletons(n) {
  const g = document.getElementById('resultsGrid');
  g.innerHTML = Array.from({length: n}, () => `
    <div class="skeleton">
      <div class="sk-thumb"></div>
      <div class="sk-body">
        <div class="sk-line" style="width:90%"></div>
        <div class="sk-line" style="width:65%"></div>
        <div class="sk-line" style="width:45%"></div>
      </div>
    </div>
  `).join('');
}

function showError(msg) {
  const g = document.getElementById('resultsGrid');
  g.innerHTML = `
    <div class="yt-empty">
      <div class="ei">⚠️</div>
      <h3>Something went wrong</h3>
      <p>${esc(msg)}</p>
    </div>`;
  document.getElementById('searchBtn').disabled = false;
  document.getElementById('searchBtn').innerHTML = '<span>🔍</span> Search';
  isLoading = false;
}

// ── Silent AudioContext keep-alive ───────────────────────────────
let _audioCtx = null, _silentSrc = null;
function startKeepAlive() {
  try {
    if (_audioCtx) { _audioCtx.resume(); return; }
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = _audioCtx.createBuffer(1, _audioCtx.sampleRate * 3, _audioCtx.sampleRate);
    _silentSrc = _audioCtx.createBufferSource();
    _silentSrc.buffer = buf;
    _silentSrc.loop = true;
    _silentSrc.connect(_audioCtx.destination);
    _silentSrc.start(0);
    document.addEventListener('visibilitychange', () => {
      if (_audioCtx?.state === 'suspended') _audioCtx.resume();
    });
  } catch(e) {}
}
function stopKeepAlive() {
  try { _silentSrc?.stop(); _silentSrc = null; _audioCtx?.close(); _audioCtx = null; } catch(e) {}
}

// ── YouTube IFrame Player API ─────────────────────────────────────
let ytPlayer = null, ytReady = false;
let currentVideoId = '', currentTitle = '', currentChannel = '';

(function() {
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
})();

window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  ytPlayer = new YT.Player('ytFrame', {
    height: '100%', width: '100%',
    playerVars: { autoplay: 0, rel: 0, playsinline: 1, controls: 1 },
    events: {
      onStateChange(e) {
        if (e.data === YT.PlayerState.PLAYING) {
          setMediaSession();
          if (navigator.mediaSession) navigator.mediaSession.playbackState = 'playing';
        } else if (e.data === YT.PlayerState.PAUSED) {
          if (navigator.mediaSession) navigator.mediaSession.playbackState = 'paused';
        }
      }
    }
  });
};

function setMediaSession() {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title:  currentTitle   || 'YouTube',
    artist: currentChannel || 'YouTube',
    album:  'ListenMe — YouTube Search',
    artwork: [
      { src: `https://img.youtube.com/vi/${currentVideoId}/mqdefault.jpg`, sizes: '320x180', type: 'image/jpeg' },
      { src: `https://img.youtube.com/vi/${currentVideoId}/hqdefault.jpg`, sizes: '480x360', type: 'image/jpeg' },
    ]
  });
  navigator.mediaSession.setActionHandler('play',  () => ytPlayer?.playVideo());
  navigator.mediaSession.setActionHandler('pause', () => ytPlayer?.pauseVideo());
  navigator.mediaSession.setActionHandler('stop',  () => closePlayer());
}

function openPlayer(videoId, title, channel) {
  currentVideoId = videoId; currentTitle = title; currentChannel = channel;
  document.getElementById('modalTitle').textContent   = title;
  document.getElementById('modalChannel').textContent = channel;
  document.getElementById('ytOpenLink').href = `https://www.youtube.com/watch?v=${videoId}`;
  document.getElementById('ytModalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  startKeepAlive();
  if (ytReady && ytPlayer?.loadVideoById) {
    ytPlayer.loadVideoById(videoId);
  } else {
    document.getElementById('ytFrame').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&playsinline=1`;
  }
}

function closePlayer() {
  document.getElementById('ytModalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  try { ytPlayer?.stopVideo(); } catch(e) { document.getElementById('ytFrame').src = ''; }
  stopKeepAlive();
  if (navigator.mediaSession) { navigator.mediaSession.metadata = null; navigator.mediaSession.playbackState = 'none'; }
}

// backdrop click handled by yt-backdrop div

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });

// ── Swipe down to close player ──────────────────────────────────
(function() {
  const modal = document.getElementById('ytModal');
  let startY = 0, isDragging = false;

  modal.addEventListener('touchstart', e => {
    // Only drag from handle or header area (top 80px)
    if (e.touches[0].clientY - modal.getBoundingClientRect().top > 80) return;
    startY = e.touches[0].clientY;
    isDragging = true;
    modal.style.transition = 'none';
  }, { passive: true });

  modal.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dy = Math.max(0, e.touches[0].clientY - startY);
    modal.style.transform = `translateY(${dy}px)`;
  }, { passive: true });

  modal.addEventListener('touchend', e => {
    if (!isDragging) return;
    isDragging = false;
    modal.style.transition = '';
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > 120) {
      closePlayer();
    } else {
      modal.style.transform = '';
    }
  });
})();

// ── Helpers ──────────────────────────────────────────────────────
function parseDuration(iso) {
  if (!iso) return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = parseInt(m[1]||0), mi = parseInt(m[2]||0), s = parseInt(m[3]||0);
  if (h) return `${h}:${mi.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  return `${mi}:${s.toString().padStart(2,'0')}`;
}

function fmtViews(n) {
  if (!n) return '';
  const num = parseInt(n);
  if (num >= 1e9) return (num/1e9).toFixed(1) + 'B';
  if (num >= 1e6) return (num/1e6).toFixed(1) + 'M';
  if (num >= 1e3) return (num/1e3).toFixed(0) + 'K';
  return num.toString();
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const d = Math.floor(diff / 86400000);
  if (d < 1)   return 'Today';
  if (d < 7)   return d + 'd ago';
  if (d < 30)  return Math.floor(d/7) + 'w ago';
  if (d < 365) return Math.floor(d/30) + 'mo ago';
  return Math.floor(d/365) + 'y ago';
}

function esc(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s) { return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

function logout() {
  try { localStorage.removeItem('listenme_token'); localStorage.removeItem('listenme_user'); } catch(e) {}
  window.location.href = 'index.html';
}
