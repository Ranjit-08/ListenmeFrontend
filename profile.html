<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — ListenMe</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    /* ── Profile hero ── */
    .profile-hero {
      background: linear-gradient(135deg, rgba(var(--primary-rgb,29,185,84),0.10), rgba(14,14,22,0.98));
      border: 1px solid var(--border); border-radius: 20px;
      padding: 40px; display: flex; align-items: center; gap: 32px;
      margin-bottom: 40px; overflow: hidden; position: relative;
      animation: fadeInUp 0.5s ease both;
    }
    .profile-hero::before {
      content:''; position:absolute; top:-40px; right:-40px;
      width:200px; height:200px; border-radius:50%;
      background:radial-gradient(circle, var(--primary-glow), transparent);
      pointer-events:none;
    }
    .avatar {
      width:88px; height:88px; border-radius:50%;
      background:linear-gradient(135deg, var(--primary), var(--accent));
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-display); font-size:34px; font-weight:900;
      color:#000; flex-shrink:0;
      box-shadow:0 8px 32px var(--primary-glow);
      animation:avatarPop 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes avatarPop {
      from{transform:scale(0.6) rotate(-10deg);opacity:0}
      to  {transform:scale(1)   rotate(0deg);  opacity:1}
    }
    .profile-name  { font-family:var(--font-display); font-size:30px; font-weight:800; margin-bottom:4px; }
    .profile-email { color:var(--text-2); font-size:14px; margin-bottom:18px; }
    .profile-stats { display:flex; gap:28px; flex-wrap:wrap; }
    .stat { text-align:center; }
    .stat-num { font-family:var(--font-display); font-size:26px; font-weight:800; color:var(--accent); }
    .stat-lbl { color:var(--muted); font-size:12px; margin-top:2px; }

    /* ── Tabs ── */
    .section-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .section-title { font-family:var(--font-display); font-size:22px; font-weight:800; }
    .tabs { display:flex; gap:6px; margin-bottom:24px; flex-wrap:wrap; }
    .tab {
      padding:8px 20px; border-radius:50px; border:1px solid var(--border);
      background:var(--card); color:var(--muted); font-size:14px;
      font-weight:500; cursor:pointer; transition:all 0.2s;
      font-family:var(--font-body);
    }
    .tab:hover { border-color:var(--border-hover); color:var(--text); }
    .tab.active { background:var(--primary-glow); border-color:var(--primary); color:var(--accent); }

    /* ── Song rows ── */
    .song-row {
      display:flex; align-items:center; gap:14px; padding:12px 16px;
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius-sm); margin-bottom:8px; cursor:pointer;
      transition:all 0.2s; animation:fadeInUp 0.3s ease both;
    }
    .song-row:hover { border-color:var(--primary); transform:translateX(3px); }
    .song-thumb { width:46px; height:46px; border-radius:8px; background:var(--surface); flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:20px; }
    .song-thumb img { width:100%; height:100%; object-fit:cover; }
    .song-info { flex:1; min-width:0; }
    .song-title { font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .song-meta  { color:var(--text-2); font-size:13px; }
    .genre-tag  { padding:3px 12px; border-radius:50px; background:var(--primary-glow); color:var(--accent); font-size:11px; font-weight:600; white-space:nowrap; flex-shrink:0; }

    /* ══════════════════════════════════════════
       THEME PICKER
    ══════════════════════════════════════════ */
    .theme-section {
      margin-bottom: 40px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 28px 24px;
      animation: fadeInUp 0.5s 0.1s ease both;
    }
    .theme-section-title {
      font-family: var(--font-display); font-size: 18px; font-weight: 800;
      margin-bottom: 6px; display: flex; align-items: center; gap: 10px;
    }
    .theme-section-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    @media (max-width: 600px) { .theme-grid { grid-template-columns: repeat(2, 1fr); } }

    .theme-card {
      border-radius: 12px; overflow: hidden;
      border: 2px solid var(--border);
      cursor: pointer; transition: all 0.2s;
      position: relative;
    }
    .theme-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .theme-card.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .theme-card.active .theme-check { opacity: 1; transform: scale(1); }

    .theme-preview {
      height: 72px; display: flex; align-items: stretch; position: relative;
    }
    .theme-preview-bg  { flex: 1; background: #0a0a0a; }
    .theme-preview-clr { width: 36px; background: var(--tc); }

    /* Mini player preview inside theme card */
    .theme-mini {
      height: 72px; background: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 0 12px;
    }
    .theme-mini-bar {
      flex: 1; height: 3px; border-radius: 3px;
      background: rgba(255,255,255,0.1); overflow: hidden;
    }
    .theme-mini-fill {
      height: 100%; width: 45%; border-radius: 3px;
    }
    .theme-mini-btn {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: #000; flex-shrink: 0;
    }

    .theme-check {
      position: absolute; top: 6px; right: 6px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--primary); color: #000;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900;
      opacity: 0; transform: scale(0.5);
      transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
    }

    .theme-name {
      padding: 9px 12px;
      background: var(--surface);
      font-size: 12px; font-weight: 700; color: var(--text-2);
      display: flex; align-items: center; justify-content: space-between;
    }
    .theme-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }

    /* Live preview notice */
    .theme-applied-toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--primary); color: #000;
      padding: 10px 22px; border-radius: 50px;
      font-size: 13px; font-weight: 700;
      opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999;
      white-space: nowrap;
    }
    .theme-applied-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Danger zone ── */
    .danger-zone {
      margin-top: 48px; padding: 24px;
      border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius);
      background: rgba(239,68,68,0.03);
    }
    .danger-title { color: var(--danger); font-weight: 700; margin-bottom: 6px; }
    .danger-desc  { color: var(--muted); font-size: 14px; margin-bottom: 16px; }

    .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty-state .icon { font-size:48px; margin-bottom:14px; opacity:0.6; }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="play.html">
    <div class="logo-icon">
      <span class="jr-mono">RJ</span>
      <div class="jr-dot"></div>
    </div>
    Listen<span>Me</span>
  </a>
  <div class="nav-links" id="navLinks">
    <a href="play.html">Discover</a>
    <a href="profile.html" class="active">Profile</a>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="adminBadge" class="admin-badge" style="display:none;">⚡ Admin</span>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="page-container">

  <!-- Hero -->
  <div class="profile-hero" id="profileHero">
    <div style="color:var(--muted);">Loading…</div>
  </div>

  <!-- ══ THEME PICKER ══ -->
  <div class="theme-section">
    <div class="theme-section-title">🎨 Player Theme</div>
    <div class="theme-section-sub">Pick a colour — it updates your entire player instantly and is saved to this device.</div>

    <div class="theme-grid" id="themeGrid">
      <!-- Cards injected by JS -->
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('favorites',this)">❤️ Favourites</button>
    <button class="tab" onclick="switchTab('recent',this)">🕐 Recent</button>
  </div>

  <div id="tabContent"></div>

  <!-- Danger zone -->
  <div class="danger-zone">
    <div class="danger-title">⚠️ Sign Out</div>
    <div class="danger-desc">Signs you out of your ListenMe account on this device.</div>
    <button class="btn btn-danger" onclick="logout()" style="font-size:14px;padding:10px 24px;">Sign Out</button>
  </div>

</div>

<!-- Toast notification -->
<div class="theme-applied-toast" id="themeToast">✓ Theme applied</div>

<audio id="audioEl" style="display:none;"></audio>

<script src="config.js"></script>
<script>
requireAuth();

/* ══════════════════════════════════════════
   THEME PICKER
══════════════════════════════════════════ */
var THEME_META = [
  { key: 'green',  name: 'Forest',   color: '#1db954', bg: '#0a0a0a' },
  { key: 'red',    name: 'Crimson',  color: '#ef4444', bg: '#0a0a0a' },
  { key: 'pink',   name: 'Blush',    color: '#ec4899', bg: '#0d0a0d' },
  { key: 'blue',   name: 'Ocean',    color: '#3b82f6', bg: '#0a0a0d' },
  { key: 'violet', name: 'Violet',   color: '#8b5cf6', bg: '#0b0a0d' },
  { key: 'amber',  name: 'Amber',    color: '#f59e0b', bg: '#0d0b0a' },
  { key: 'cyan',   name: 'Neon',     color: '#06b6d4', bg: '#0a0d0d' },
  { key: 'white',  name: 'Mono',     color: '#e5e5e5', bg: '#0a0a0a' },
];

function buildThemeGrid() {
  var current = window.LMTheme ? window.LMTheme.current() : 'green';
  var grid = document.getElementById('themeGrid');
  grid.innerHTML = THEME_META.map(function(t) {
    var isActive = t.key === current;
    return [
      '<div class="theme-card' + (isActive ? ' active' : '') + '"',
      '     id="tc-' + t.key + '"',
      '     onclick="pickTheme(\'' + t.key + '\')"',
      '     title="' + t.name + '">',
      '  <div class="theme-mini" style="background:' + t.bg + '">',
      '    <div class="theme-mini-bar">',
      '      <div class="theme-mini-fill" style="background:' + t.color + '"></div>',
      '    </div>',
      '    <div class="theme-mini-btn" style="background:' + t.color + '">&#9654;</div>',
      '    <div class="theme-mini-bar">',
      '      <div class="theme-mini-fill" style="background:' + t.color + ';width:25%;"></div>',
      '    </div>',
      '  </div>',
      '  <div class="theme-check" id="chk-' + t.key + '">✓</div>',
      '  <div class="theme-name">',
      '    <span>' + t.name + '</span>',
      '    <span class="theme-dot" style="background:' + t.color + '"></span>',
      '  </div>',
      '</div>'
    ].join('');
  }).join('');
}

function pickTheme(key) {
  // Remove active from all cards
  THEME_META.forEach(function(t) {
    var card = document.getElementById('tc-' + t.key);
    var chk  = document.getElementById('chk-' + t.key);
    if (card) card.classList.remove('active');
  });
  // Mark selected
  var sel = document.getElementById('tc-' + key);
  if (sel) sel.classList.add('active');

  // Apply theme globally
  if (window.LMTheme) window.LMTheme.apply(key);

  // Show toast
  showToast('✓ ' + (THEME_META.find(function(t){return t.key===key;}) || {name:'Theme'}).name + ' theme applied');
}

var toastTimer;
function showToast(msg) {
  var toast = document.getElementById('themeToast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ toast.classList.remove('show'); }, 2200);
}

/* ══════════════════════════════════════════
   PROFILE DATA
══════════════════════════════════════════ */
var audio       = document.getElementById('audioEl');
var favSongs    = [];
var recentSongs = [];
var currentTab  = 'favorites';

async function loadProfile() {
  try {
    var data = await api.get('/auth/me');
    var user = data.user;
    var inits = user.name.split(' ').map(function(n){return n[0];}).join('').toUpperCase().slice(0,2);

    if (user.is_admin) {
      document.getElementById('adminBadge').style.display = 'inline-flex';
      var navLinks  = document.getElementById('navLinks');
      var uploadLink = document.createElement('a');
      uploadLink.href = 'upload.html'; uploadLink.textContent = 'Upload';
      navLinks.insertBefore(uploadLink, navLinks.children[1]);
    }

    document.getElementById('profileHero').innerHTML =
      '<div class="avatar">' + inits + '</div>' +
      '<div>' +
        '<div class="profile-name">' + esc(user.name) + '</div>' +
        '<div class="profile-email">' + esc(user.email) + '</div>' +
        (user.is_admin ? '<div class="admin-badge" style="margin-bottom:14px;">⚡ Admin</div>' : '') +
        '<div class="profile-stats">' +
          '<div class="stat"><div class="stat-num" id="favCount">—</div><div class="stat-lbl">Favourites</div></div>' +
          '<div class="stat"><div class="stat-num">' + formatDate(user.created_at) + '</div><div class="stat-lbl">Member since</div></div>' +
        '</div>' +
      '</div>';
  } catch(e) {
    document.getElementById('profileHero').innerHTML = '<div style="color:var(--danger);">Failed to load profile.</div>';
  }
}

async function loadFavorites() {
  try {
    var data = await api.get('/songs/favorites');
    favSongs  = data.songs;
    var fc = document.getElementById('favCount');
    if (fc) fc.textContent = favSongs.length;
    if (currentTab === 'favorites') renderSongs(favSongs, true);
  } catch(e) {}
}

async function loadRecent() {
  try {
    var data = await api.get('/songs');
    recentSongs = data.songs.slice(0, 20);
    if (currentTab === 'recent') renderSongs(recentSongs, false);
  } catch(e) {}
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  if (tab === 'favorites') renderSongs(favSongs, true);
  else renderSongs(recentSongs, false);
}

function renderSongs(songs, showRemove) {
  var container = document.getElementById('tabContent');
  if (!songs.length) {
    var icon = showRemove ? '❤️' : '🎵';
    var msg  = showRemove ? "You haven't favourited any songs yet." : "No songs in library yet.";
    container.innerHTML = '<div class="empty-state"><div class="icon">' + icon + '</div><div>' + msg + '</div><a href="play.html" class="btn btn-primary" style="display:inline-flex;width:auto;margin-top:20px;">Go to Library</a></div>';
    return;
  }
  container.innerHTML = songs.map(function(s, i) {
    return '<div class="song-row" style="animation-delay:' + (i*0.04) + 's" onclick="playSong(\'' + escJs(s.audio_url) + '\')">' +
      '<div class="song-thumb">' + (s.cover_url ? '<img src="' + esc(s.cover_url) + '"/>' : '🎵') + '</div>' +
      '<div class="song-info"><div class="song-title">' + esc(s.title) + '</div><div class="song-meta">' + esc(s.artist) + (s.album ? ' · ' + esc(s.album) : '') + '</div></div>' +
      (s.genre ? '<span class="genre-tag">' + esc(s.genre) + '</span>' : '') +
      (showRemove ? '<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();removeFav(' + s.id + ')">♡ Remove</button>' : '') +
      '</div>';
  }).join('');
}

function playSong(url) { audio.src = url; audio.play(); }

async function removeFav(id) {
  try { await api.del('/songs/' + id + '/favorite'); await loadFavorites(); }
  catch(e) { alert(e.error || 'Failed to remove.'); }
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'short' });
}
function esc(s)   { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// Init
buildThemeGrid();
loadProfile();
loadFavorites();
loadRecent();
</script>
</body>
</html>
